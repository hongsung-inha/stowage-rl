# ══════════════════════════════════════════════════════════════════
#  vessl_aggregate.yaml — 통합 분석 (6개 정책 학습 완료 후 1회 실행)
#
#  6개 train 잡이 모두 끝나(/output/<policy>/_SUCCESS 6개 존재) 나면
#  이 잡을 1번 실행한다. 같은 stowage-output 볼륨을 /output 에 마운트해
#  6개 결과를 로드하고 Figure 1~6 + 가설검증 + Excel + RDB/LPG/RAG/SFT
#  데이터셋을 모두 생성한 뒤 /output/_aggregate/ 에 저장한다.
#
#  CLI:
#     vessl run create -f vessl_aggregate.yaml
#
#  ※ REQUIRE_ALL=1 이면 6개 _SUCCESS 가 모두 있어야 진행한다.
#    일부만으로 부분 분석하려면 --env REQUIRE_ALL=0 으로 제출.
# ══════════════════════════════════════════════════════════════════
name: stowage-v17-aggregate
description: "Aggregate 6 policy results → Figures 1-6, hypothesis, Excel, datasets"

resources:
  cluster: vessl-gcp-oregon          # ← 사용 클러스터로 교체
  preset: cpu-medium                 # 분석은 GPU 불필요 (CPU 충분)

image: quay.io/vessl-ai/torch:2.3.1-cuda12.1

import:
  /root/code/:
    git:
      url: https://github.com/hongsung-inha/stowage-rl
      ref: main

export:
  /output/:
    volume: stowage-output           # ← train 잡과 동일 볼륨

run:
  - workdir: /root/code
    command: |
      set -e
      apt-get update && apt-get install -y fonts-nanum fontconfig || true
      fc-cache -fv || true
      pip install -r requirements.txt
      echo "▶ Aggregating all policy results"
      OUTPUT_ROOT=/output SEED=${SEED:-42} REQUIRE_ALL=${REQUIRE_ALL:-1} \
        python aggregate.py

env:
  SEED: "42"
  REQUIRE_ALL: "1"
